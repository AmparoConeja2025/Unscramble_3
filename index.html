<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Unscramble 3</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <a href="https://amparoconeja.com" class="home-button" aria-label="Return to Homepage">
        <img src="Image/my-home-icon.svg" alt="Home">
    </a>

    <button class="reset-btn" id="resetButton">Reset</button>
    <button class="undo-btn" id="undoButton" disabled>↶</button>
    <button class="reset-btn" id="resetButton" onclick="loadLesson(currentLessonIndex)">Reset</button>
   

    <!-- DIANNE AVATAR -->
    <img src="Image/dianne.png" alt="Dianne" class="dianne-image dianne-flipped" id="dianneImage" style="cursor: pointer;" />
    <audio id="narratorAudio"></audio>
    <audio id="answerAudio"></audio>

    <!-- DROP ZONE -->
    <div id="dropZone" class="drop-zone"></div>

    <!-- WORD BANK -->
    <div id="wordBank" class="word-bank"></div>

    <!-- NAVIGATION -->
    <div class="lesson-nav">
        <button class="nav-btn" id="prevBtn">← Previous</button>
        <button class="nav-btn" id="nextBtn">Next →</button>
    </div>

    <!-- FIREWORKS -->
    <div class="fireworks-container" id="fireworksContainer"></div>

    <!-- TRY AGAIN -->
    <div class="try-again-text" id="tryAgainText">🤔 Try Again! 💭</div>

    <script src="lessons.js"></script>
    <script src="script.js"></script>

</body>
</html>
