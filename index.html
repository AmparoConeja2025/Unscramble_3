<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Unscramble 3</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <a href="https://amparoconeja.com" class="home-button" aria-label="Return to Homepage">
        <img src="Image/my-home-icon.svg" alt="Home">
    </a>

    <button class="reset-btn" id="resetButton">Reset</button>
    <button class="undo-btn" id="undoButton" disabled>↶</button>
    <button class="reset-btn" id="resetButton" onclick="loadLesson(currentLessonIndex)">Reset</button>
   

    <!-- AVATARS -->
<img src="Image/dianne.png" alt="Dianne" class="dianne-image" id="dianneImage" style="cursor: pointer; display: none;" />
<img src="Image/adam.png" alt="Adam" class="adam-image" id="adamImage" style="cursor: pointer; display: none;" />
<img src="Image/becky.png" alt="Becky" class="becky-image" id="beckyImage" style="cursor: pointer; display: none;" />
<img src="Image/harry.png" alt="Harry" class="harryImage" id="harryImage" style="cursor: pointer; display: none;" />
<img src="Image/mark.png" alt="Mark" class="mark-image" id="markImage" style="cursor: pointer; display: none;" />
<img src="Image/jessica.png" alt="Jessica" class="jessica-image" id="jessicaImage" style="cursor: pointer; display: none;" />
<img src="Image/john.png" alt="John" class="john-image" id="johnImage" style="cursor: pointer; display: none;" />
<img src="Image/laura.png" alt="Laura" class="laura-image" id="lauraImage" style="cursor: pointer; display: none;" />

<audio id="narratorAudio"></audio>
<audio id="answerAudio"></audio>

    <!-- DROP ZONE -->
    <div id="dropZone" class="drop-zone"></div>

    <!-- WORD BANK -->
    <div id="wordBank" class="word-bank"></div>

    <!-- NAVIGATION -->
    <div class="lesson-nav">
        <button class="nav-btn" id="prevBtn">← Previous</button>
        <button class="nav-btn" id="nextBtn">Next →</button>
    </div>

    <!-- FIREWORKS -->
    <div class="fireworks-container" id="fireworksContainer"></div>

    <!-- TRY AGAIN -->
    <div class="try-again-text" id="tryAgainText">🤔 Try Again! 💭</div>

    <script src="lessons.js"></script>
    <script src="script.js"></script>

</body>
</html>
